<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Magic Fruit Splash Breaker 🍉</title>
  <meta name="description" content="可愛主題的網頁打磚塊遊戲：滑動擋板，打掉磚塊、水球與水果，清光 5 個關卡！" />
  <meta name="theme-color" content="#ff7043" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fruit Breaker" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <!-- 頂部 HUD -->
    <header id="hud" class="hud hidden">
      <div class="hud-left">
        <span id="level-badge" class="badge">第 1 關</span>
        <span id="score-badge" class="badge">分數 0</span>
      </div>
      <div class="hud-right">
        <span id="lives-badge" class="badge lives">❤️❤️❤️❤️❤️</span>
        <button id="mute-btn" class="icon-btn" aria-label="切換音效">🔊</button>
      </div>
    </header>

    <!-- 主畫面 / 遊戲畫布 -->
    <main id="stage">
      <canvas id="game-canvas" width="540" height="900"></canvas>

      <!-- 開始畫面 -->
      <section id="title-screen" class="overlay">
        <h1 class="title">🧱🍉 Magic Fruit<br/>Splash Breaker 💧</h1>
        <p class="subtitle">滑動擋板、打掉磚塊、水球與水果！</p>
        <div class="mode-buttons">
          <button class="big-btn easy" data-mode="easy">
            <span class="emoji">🌈</span>
            <span class="btn-title">輕鬆模式</span>
            <span class="btn-desc">無限重生，玩到爽</span>
          </button>
          <button class="big-btn challenge" data-mode="challenge">
            <span class="emoji">⭐</span>
            <span class="btn-title">挑戰模式</span>
            <span class="btn-desc">5 顆愛心，看你能撐到幾關</span>
          </button>
        </div>
        <p class="hint">提示：手機用手指拖曳，電腦用滑鼠或 ← → 鍵</p>
        <button id="dev-mode-btn" class="dev-link">⚙️ 開發者模式</button>
      </section>

      <!-- 開發者模式畫面 -->
      <section id="dev-screen" class="overlay hidden dev-overlay">
        <h2 class="dev-title">⚙️ 開發者模式</h2>
        <p class="subtitle">快速測試任何關卡與球速</p>

        <div class="dev-group">
          <label class="dev-label">起始關卡</label>
          <div class="seg-group" id="dev-level-group">
            <button class="seg-btn active" data-level="0">1·暖身</button>
            <button class="seg-btn" data-level="1">2·水花</button>
            <button class="seg-btn" data-level="2">3·笑臉</button>
            <button class="seg-btn" data-level="3">4·果園</button>
            <button class="seg-btn" data-level="4">5·愛心</button>
            <button class="seg-btn" data-level="5">6·拱橋</button>
            <button class="seg-btn" data-level="6">7·雙星</button>
            <button class="seg-btn" data-level="7">8·圍城</button>
            <button class="seg-btn" data-level="8">9·漏斗</button>
            <button class="seg-btn" data-level="9">10·BOSS</button>
          </div>
        </div>

        <div class="dev-group">
          <label class="dev-label">球速倍率</label>
          <div class="seg-group" id="dev-speed-group">
            <button class="seg-btn" data-speed="0.5">0.5×</button>
            <button class="seg-btn active" data-speed="1">1×</button>
            <button class="seg-btn" data-speed="1.5">1.5×</button>
            <button class="seg-btn" data-speed="2">2×</button>
            <button class="seg-btn" data-speed="3">3×</button>
          </div>
        </div>

        <div class="dev-group">
          <label class="dev-label">遊戲模式</label>
          <div class="seg-group" id="dev-mode-group">
            <button class="seg-btn active" data-devmode="easy">🌈 輕鬆</button>
            <button class="seg-btn" data-devmode="challenge">⭐ 挑戰</button>
          </div>
        </div>

        <div class="dev-actions">
          <button id="dev-start-btn" class="big-btn confirm">🚀 開始</button>
          <button id="dev-open-editor-btn" class="big-btn editor-link">🎨 關卡設計器</button>
          <button id="dev-open-mylevels-btn" class="big-btn mylevels-link">📂 我的關卡</button>
          <button id="dev-back-btn" class="ghost-btn">← 返回主畫面</button>
        </div>
      </section>

      <!-- 關卡編輯器 -->
      <section id="editor-screen" class="overlay hidden editor-overlay">
        <header class="ed-header">
          <button id="ed-back-btn" class="ghost-btn small">⬅ 返回</button>
          <h2 class="ed-title">🎨 關卡設計器</h2>
          <button id="ed-mylevels-btn" class="ghost-btn small">📂 我的關卡</button>
        </header>

        <details class="ed-props" open>
          <summary>關卡屬性</summary>
          <div class="ed-props-body">
            <label class="ed-field">
              <span>名稱</span>
              <input id="ed-name" type="text" maxlength="20" placeholder="我的關卡">
            </label>
            <label class="ed-field">
              <span>球速 <output id="ed-speed-val">400</output></span>
              <input id="ed-speed" type="range" min="200" max="800" step="20" value="400">
            </label>
            <label class="ed-field">
              <span>排數 <output id="ed-rows-val">7</output></span>
              <input id="ed-rows" type="range" min="3" max="15" step="1" value="7">
            </label>
            <label class="ed-field">
              <span>背景</span>
              <select id="ed-theme">
                <option value="warm">🌅 暖橘</option>
                <option value="ocean">🌊 海洋</option>
                <option value="forest">🌲 森林</option>
                <option value="night">🌃 夜空</option>
                <option value="candy">🍭 糖果</option>
              </select>
            </label>
          </div>
        </details>

        <div class="ed-toolbar">
          <div class="ed-palette" id="ed-palette">
            <button class="ed-tile active" data-mat="B" title="磚塊">🟥</button>
            <button class="ed-tile" data-mat="W" title="水球">💧</button>
            <button class="ed-tile" data-mat="F" title="西瓜">🍉</button>
            <button class="ed-tile" data-mat="S" title="草莓">🍓</button>
            <button class="ed-tile" data-mat="O" title="橘子">🍊</button>
            <button class="ed-tile" data-mat="H" title="鋼磚 (3 hp)">🛡️</button>
            <button class="ed-tile" data-mat="X" title="不可破">⛔</button>
            <button class="ed-tile" data-mat="G" title="寶石 +100">💎</button>
            <button class="ed-tile" data-mat="?" title="神秘箱">🎁</button>
            <button class="ed-tile" data-mat="N" title="隱藏磚">🌑</button>
            <button class="ed-tile" data-mat="Z" title="加速磚">⚡</button>
            <button class="ed-tile" data-mat="." title="橡皮擦">⬜</button>
          </div>
          <div class="ed-tools">
            <button id="ed-mirror-btn" class="ed-tool" title="左右鏡像">🪞</button>
            <button id="ed-undo-btn" class="ed-tool" title="撤銷 Ctrl+Z">↩</button>
            <button id="ed-redo-btn" class="ed-tool" title="重做 Ctrl+Y">↪</button>
            <button id="ed-clear-btn" class="ed-tool" title="全部清空">🗑</button>
            <button id="ed-template-btn" class="ed-tool" title="從樣板">📋</button>
            <button id="ed-fill-btn" class="ed-tool" title="整排填滿">🪣</button>
          </div>
        </div>

        <div class="ed-canvas-wrap">
          <canvas id="ed-canvas" width="540" height="700"></canvas>
        </div>

        <div class="ed-actions">
          <button id="ed-save-btn" class="big-btn confirm small">💾 存檔</button>
          <button id="ed-test-btn" class="big-btn confirm small">▶ 試玩</button>
          <button id="ed-export-btn" class="ghost-btn small">📤 匯出</button>
        </div>
      </section>

      <!-- 我的關卡列表 -->
      <section id="mylevels-screen" class="overlay hidden mylevels-overlay">
        <header class="ed-header">
          <button id="ml-back-btn" class="ghost-btn small">⬅ 返回</button>
          <h2 class="ed-title">📂 我的關卡 <span id="ml-count" class="ml-count">(0)</span></h2>
          <button id="ml-editor-btn" class="ghost-btn small">🎨 編輯器</button>
        </header>

        <p class="ml-hint">啟用中的關卡會在正式 10 關之後依序播放</p>

        <div id="ml-list" class="ml-list"></div>

        <div class="ml-empty hidden" id="ml-empty">
          <p>📭 還沒有自製關卡</p>
          <p>點下面的「新增空白」開始設計！</p>
        </div>

        <div class="ed-actions">
          <button id="ml-new-btn" class="big-btn confirm small">➕ 新增空白</button>
          <button id="ml-template-btn" class="big-btn editor-link small">📋 從樣板建立</button>
          <button id="ml-import-btn" class="ghost-btn small">📥 匯入 JSON</button>
          <button id="ml-export-all-btn" class="ghost-btn small">📤 匯出全部</button>
        </div>
      </section>

      <!-- 樣板選單 -->
      <section id="template-screen" class="overlay hidden template-overlay">
        <header class="ed-header">
          <button id="tpl-back-btn" class="ghost-btn small">⬅ 返回</button>
          <h2 class="ed-title">📋 選擇樣板</h2>
          <span></span>
        </header>
        <div class="tpl-grid" id="tpl-grid"></div>
      </section>

      <!-- 文字輸入彈窗（匯入/匯出 JSON） -->
      <section id="text-dialog" class="overlay hidden text-dialog-overlay">
        <h2 class="ed-title" id="td-title">標題</h2>
        <textarea id="td-textarea" spellcheck="false"></textarea>
        <div class="td-actions">
          <button id="td-copy-btn" class="big-btn confirm small">📋 複製</button>
          <button id="td-confirm-btn" class="big-btn confirm small">✓ 確認</button>
          <button id="td-cancel-btn" class="ghost-btn small">取消</button>
        </div>
      </section>

      <!-- 過關畫面 -->
      <section id="clear-screen" class="overlay hidden">
        <h2 class="big-text">🎉 過關！</h2>
        <p id="clear-info" class="subtitle"></p>
        <button id="next-level-btn" class="big-btn confirm">下一關 →</button>
      </section>

      <!-- 全破畫面 -->
      <section id="victory-screen" class="overlay hidden">
        <h2 class="big-text">🏆 全部過關！</h2>
        <p id="victory-info" class="subtitle">你超棒！</p>
        <button id="play-again-btn" class="big-btn confirm">再玩一次</button>
      </section>

      <!-- Game Over -->
      <section id="gameover-screen" class="overlay hidden">
        <h2 class="big-text">💔 愛心用完了</h2>
        <p id="gameover-info" class="subtitle">沒關係，再試一次！</p>
        <button id="retry-btn" class="big-btn confirm">再試一次</button>
        <button id="back-title-btn" class="ghost-btn">回主畫面</button>
      </section>

      <!-- 暫停 -->
      <section id="pause-screen" class="overlay hidden">
        <h2 class="big-text">⏸ 暫停</h2>
        <button id="resume-btn" class="big-btn confirm">繼續</button>
        <button id="quit-btn" class="ghost-btn">回主畫面</button>
      </section>

      <!-- 暫停按鈕（遊戲中） -->
      <button id="pause-btn" class="floating-btn hidden" aria-label="暫停">⏸</button>
    </main>

    <footer id="footer">
      <small>用手指或滑鼠移動擋板 · ESC 暫停</small>
    </footer>
  </div>

  <script src="./js/game.js"></script>
  <script src="./js/editor.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
