<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="60%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#e64a19"/>
    </radialGradient>
    <radialGradient id="melon" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="60%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>
    <linearGradient id="rind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aed581"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <radialGradient id="drop" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="60%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </radialGradient>
  </defs>

  <!-- 背景圓角方塊 -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 西瓜半圓（中央偏左） -->
  <g transform="translate(180 200) rotate(-15)">
    <circle cx="0" cy="0" r="155" fill="url(#rind)"/>
    <circle cx="0" cy="0" r="128" fill="url(#melon)"/>
    <!-- 黑色籽 -->
    <g fill="#3e2723">
      <ellipse cx="-50" cy="-30" rx="6" ry="11" transform="rotate(-20 -50 -30)"/>
      <ellipse cx="20"  cy="-50" rx="6" ry="11" transform="rotate(15 20 -50)"/>
      <ellipse cx="60"  cy="-10" rx="6" ry="11" transform="rotate(40 60 -10)"/>
      <ellipse cx="-30" cy="40"  rx="6" ry="11" transform="rotate(-30 -30 40)"/>
      <ellipse cx="40"  cy="60"  rx="6" ry="11" transform="rotate(50 40 60)"/>
    </g>
    <!-- 高光 -->
    <ellipse cx="-55" cy="-65" rx="40" ry="22" fill="#fff" opacity="0.45" transform="rotate(-25 -55 -65)"/>
  </g>

  <!-- 水滴（右上角） -->
  <g transform="translate(380 150)">
    <path d="M0,-60 C40,-10 50,30 0,50 C-50,30 -40,-10 0,-60 Z" fill="url(#drop)"/>
    <ellipse cx="-15" cy="-20" rx="12" ry="6" fill="#fff" opacity="0.7" transform="rotate(-30 -15 -20)"/>
  </g>

  <!-- 磚塊（左下角） -->
  <g transform="translate(110 380)">
    <rect x="-70" y="-22" width="140" height="44" rx="14" fill="#5e9bff" stroke="#1e88e5" stroke-width="4"/>
    <rect x="-58" y="-15" width="116" height="8" rx="4" fill="#fff" opacity="0.55"/>
  </g>

  <!-- 擋板 + 球（底部） -->
  <g transform="translate(256 440)">
    <rect x="-90" y="-12" width="180" height="22" rx="11" fill="#ffca28" stroke="#f57c00" stroke-width="4"/>
    <rect x="-78" y="-7" width="156" height="6" rx="3" fill="#fff" opacity="0.6"/>
    <circle cx="0" cy="-40" r="18" fill="#ffeb3b" stroke="#ef6c00" stroke-width="3"/>
    <circle cx="-5" cy="-46" r="6" fill="#fff" opacity="0.8"/>
  </g>
</svg>
